name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Build + test on Linux (Core, Console, Tests) ──────────────────────────
  build-linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore CopilotUsageFilter.slnx

      - name: Build (all projects)
        run: dotnet build CopilotUsageFilter.slnx --configuration Release --no-restore

      - name: Test
        run: >
          dotnet test Tests/CopilotUsageFilter.Tests.csproj
          --configuration Release --no-build
          --logger "trx;LogFileName=test-results.trx"
          --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-linux
          path: TestResults/

  # ── Build on Windows (verifies WinForms project compiles + tests pass) ────
  build-windows:
    name: Build & Test (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore CopilotUsageFilter.slnx

      - name: Build (all projects)
        run: dotnet build CopilotUsageFilter.slnx --configuration Release --no-restore

      - name: Test
        run: >
          dotnet test Tests/CopilotUsageFilter.Tests.csproj
          --configuration Release --no-build
          --logger "trx;LogFileName=test-results.trx"
          --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-windows
          path: TestResults/
